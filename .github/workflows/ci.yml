name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# Cancel superseded runs on the same ref (e.g. quick successive pushes to a PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Demo mode needs no MongoDB; sampleData.json is gitignored so
      # demoStore.js falls back to a small built-in seed automatically
      DEMO_MODE: 'true'
      TOKEN_SIGN: ci-test-secret-not-used-in-prod
      # postinstall runs `prisma generate`, which only reads the schema but
      # still needs DATABASE_URL to resolve at config-load time — dummy
      # value, never actually connected to in demo-mode tests.
      DATABASE_URL: mysql://ci:ci@localhost:3306/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test

  frontend:
    name: Frontend (test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build
      # NOTE: `npm run lint` is intentionally omitted — the existing codebase
      # has pre-existing lint violations unrelated to CI setup; enable once
      # those are cleaned up separately.
